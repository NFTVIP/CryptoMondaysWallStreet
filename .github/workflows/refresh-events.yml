name: Refresh Events

# Runs automatically every 6 hours and on every push to main.
# Fetches live events from Luma, writes events.json, and commits
# the result so the static site always serves fresh data.
#
# Required GitHub Secrets (Settings → Secrets → Actions → New repository secret):
#   LUMA_API_KEY      — your Luma API key (lu.ma/settings → Integrations → API)
#   LUMA_CALENDAR_ID  — your calendar's API ID (cal-xxxxxxxxxxxxxxxx)

on:
  push:
    branches: [main]
  schedule:
    # Every 6 hours at :05 past the hour
    - cron: '5 */6 * * *'
  # Allow manual runs from the Actions tab
  workflow_dispatch:

jobs:
  fetch:
    name: Fetch & commit events.json
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the updated events.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history so git push doesn't complain
          fetch-depth: 0

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: Website/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: Website

      - name: Fetch events from Luma
        run: node fetch-events.js
        working-directory: Website
        env:
          LUMA_API_KEY: ${{ secrets.LUMA_API_KEY }}
          LUMA_CALENDAR_ID: ${{ secrets.LUMA_CALENDAR_ID }}

      - name: Commit updated events.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Website/events.json
          # Only commit if the file actually changed
          if git diff --staged --quiet; then
            echo "events.json unchanged — nothing to commit."
          else
            UPCOMING=$(node -e "const d=require('./events.json');console.log(d.upcoming.length)" 2>/dev/null || echo '?')
            PAST=$(node     -e "const d=require('./events.json');console.log(d.past.length)"     2>/dev/null || echo '?')
            git commit -m "chore: refresh events.json — ${UPCOMING} upcoming, ${PAST} past [skip ci]"
            git push
          fi
        working-directory: Website
